<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timetable Scheduler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: #2d3748;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.35rem; font-weight: 600; }
    header span { font-size: 1.5rem; }

    main {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      padding: 1.25rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #2d3748;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.55rem 1.25rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background .2s, opacity .2s;
    }

    #btn-schedule {
      background: #3182ce;
      color: #fff;
    }
    #btn-schedule:hover { background: #2b6cb0; }
    #btn-schedule:disabled { opacity: .5; cursor: default; }

    #btn-reset {
      background: #edf2f7;
      color: #4a5568;
    }
    #btn-reset:hover { background: #e2e8f0; }

    #status {
      font-size: 0.8rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }
    #status.error { color: #e53e3e; }
    #status.ok    { color: #38a169; }

    /* ---- Form styles ---- */

    .settings-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .three-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 860px) {
      .three-cols { grid-template-columns: 1fr; }
    }

    .form-section h3 {
      font-size: 0.8rem;
      font-weight: 700;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 0.6rem;
      padding-bottom: 0.35rem;
      border-bottom: 2px solid #e2e8f0;
    }

    .item-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-start;
      padding: 0.6rem 0.75rem;
      background: #f7fafc;
      border-radius: 6px;
      margin-bottom: 0.4rem;
      border: 1px solid #e2e8f0;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .field-group label {
      font-size: 0.68rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
    }

    .field-group input[type=text],
    .field-group input[type=number],
    .field-group select {
      padding: 0.3rem 0.5rem;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 0.82rem;
      background: #fff;
      color: #1a202c;
      min-width: 0;
    }

    .field-group input[type=text]:focus,
    .field-group input[type=number]:focus,
    .field-group select:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 2px rgba(66,153,225,.2);
    }

    .field-group input[type=text] { min-width: 110px; }

    /* Slot chips */
    .slot-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      align-items: center;
      padding: 0.2rem 0;
    }

    .chip {
      background: #e2e8f0;
      border-radius: 9999px;
      padding: 0.15rem 0.35rem 0.15rem 0.55rem;
      font-size: 0.72rem;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      color: #4a5568;
    }

    .chip-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
      font-weight: 700;
    }
    .chip-btn:hover { color: #e53e3e; }

    .slot-add-row {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #718096;
    }

    .slot-add-row input {
      width: 44px;
      padding: 0.2rem 0.3rem;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 0.75rem;
      text-align: center;
      background: #fff;
      color: #1a202c;
    }
    .slot-add-row input:focus {
      outline: none;
      border-color: #4299e1;
    }

    .btn-add-slot {
      padding: 0.18rem 0.45rem;
      font-size: 0.75rem;
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-add-slot:hover { background: #bee3f8; }

    .btn-delete {
      background: none;
      color: #a0aec0;
      border: none;
      font-size: 1.05rem;
      cursor: pointer;
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      margin-left: auto;
      align-self: flex-start;
      line-height: 1;
    }
    .btn-delete:hover { color: #e53e3e; background: #fff5f5; }

    .btn-add-item {
      background: #f7fafc;
      color: #4a5568;
      border: 1px dashed #cbd5e0;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      margin-top: 0.25rem;
      text-align: center;
    }
    .btn-add-item:hover { background: #edf2f7; border-color: #a0aec0; }

    /* Subject rows have more fields — wrap naturally */
    .subject-row-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }

    /* ---- Results ---- */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .stat-box {
      background: #ebf8ff;
      border-left: 4px solid #3182ce;
      border-radius: 6px;
      padding: 0.75rem 1rem;
    }
    .stat-box .label { font-size: 0.75rem; color: #4a5568; text-transform: uppercase; letter-spacing: .05em; }
    .stat-box .value { font-size: 1.5rem; font-weight: 700; color: #2b6cb0; }

    .timetable-wrapper { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.8rem;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 0.45rem 0.65rem;
      text-align: left;
      white-space: nowrap;
    }
    thead th {
      background: #2d3748;
      color: #fff;
      font-weight: 600;
    }
    tbody tr:nth-child(even) { background: #f7fafc; }

    .pill {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .pill-hard { background: #fed7d7; color: #9b2c2c; }
    .pill-soft { background: #fefcbf; color: #744210; }

    .conflict-list {
      list-style: none;
      margin-top: 0.5rem;
    }
    .conflict-list li {
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.35rem;
      font-size: 0.82rem;
    }
    .conflict-list li.hard { background: #fff5f5; border-left: 3px solid #fc8181; }
    .conflict-list li.soft { background: #fffff0; border-left: 3px solid #f6e05e; }

    #placeholder {
      text-align: center;
      padding: 3rem 1rem;
      color: #a0aec0;
      font-size: 0.9rem;
    }

    .hidden { display: none !important; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab {
      padding: 0.4rem 1rem;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      font-size: 0.85rem;
      color: #4a5568;
      border: 2px solid transparent;
      border-bottom: none;
      margin-bottom: -2px;
    }
    .tab.active {
      background: #fff;
      border-color: #e2e8f0;
      border-bottom-color: #fff;
      color: #2d3748;
      font-weight: 600;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<header>
  <span>🗓️</span>
  <h1>Timetable Scheduler</h1>
</header>

<main>
  <!-- Configuration form -->
  <div class="card">
    <h2>Timetable Configuration</h2>

    <!-- Basic settings -->
    <div class="settings-row">
      <div class="field-group">
        <label>Timetable Name</label>
        <input type="text" id="tt-name" style="min-width:200px" />
      </div>
      <div class="field-group">
        <label>Days per Week</label>
        <input type="number" id="tt-days" min="1" max="7" style="width:70px" />
      </div>
      <div class="field-group">
        <label>Periods per Day</label>
        <input type="number" id="tt-periods" min="1" max="20" style="width:70px" />
      </div>
    </div>

    <!-- Teachers / Rooms / Columns -->
    <div class="three-cols">

      <div class="form-section">
        <h3>Teachers</h3>
        <div id="teachers-container"></div>
        <button class="btn-add-item" onclick="addTeacher()">+ Add Teacher</button>
      </div>

      <div class="form-section">
        <h3>Rooms</h3>
        <div id="rooms-container"></div>
        <button class="btn-add-item" onclick="addRoom()">+ Add Room</button>
      </div>

      <div class="form-section">
        <h3>Columns <span style="font-weight:400;font-size:.75rem;color:#718096;text-transform:none;letter-spacing:0">(option blocks)</span></h3>
        <div id="columns-container"></div>
        <button class="btn-add-item" onclick="addColumn()">+ Add Column</button>
      </div>

    </div>

    <!-- Subjects -->
    <div class="form-section" style="margin-bottom:1rem">
      <h3>Subjects</h3>
      <div id="subjects-container"></div>
      <button class="btn-add-item" onclick="addSubject()">+ Add Subject</button>
    </div>

    <div class="actions">
      <button id="btn-schedule">⚡ Generate Timetable</button>
      <button id="btn-reset">↺ Reset to Example</button>
    </div>
    <p id="status"></p>
  </div>

  <!-- Results -->
  <div class="card" id="results">
    <div id="placeholder">
      Fill in the configuration above and click <strong>Generate Timetable</strong> to see results.
    </div>
    <div id="output" class="hidden">
      <div class="result-grid" id="stats"></div>

      <div class="tabs">
        <div class="tab active" data-tab="timetable">Timetable</div>
        <div class="tab" data-tab="sessions">All Sessions</div>
        <div class="tab" data-tab="conflicts">Conflicts</div>
      </div>

      <div class="tab-panel active" id="tab-timetable">
        <div class="timetable-wrapper" id="grid-container"></div>
      </div>

      <div class="tab-panel" id="tab-sessions">
        <div class="timetable-wrapper">
          <table id="sessions-table">
            <thead>
              <tr>
                <th>Day</th><th>Period</th><th>Column</th>
                <th>Subject</th><th>Teacher</th><th>Room</th>
              </tr>
            </thead>
            <tbody id="sessions-body"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel" id="tab-conflicts">
        <ul class="conflict-list" id="conflict-list"></ul>
        <p id="no-conflicts" style="color:#38a169;font-size:.85rem;" class="hidden">
          ✅ No conflicts found.
        </p>
      </div>
    </div>
  </div>
</main>

<script>
const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ── State ────────────────────────────────────────────────────────────────────
// Each section is an array of plain objects that mirror the JSON schema.
let s = { name: "", days_per_week: 5, periods_per_day: 6, teachers: [], rooms: [], columns: [], subjects: [] };

// Scoped helper registry — avoids polluting the global window object.
const _h = {};

const EXAMPLE = {
  name: "Example School Timetable",
  days_per_week: 5,
  periods_per_day: 6,
  teachers: [
    { name: "Ms. Smith",  unavailable: [] },
    { name: "Mr. Jones",  unavailable: [[1,1]] },
    { name: "Mrs. Brown", unavailable: [] },
    { name: "Mr. Davis",  unavailable: [[5,6]] }
  ],
  rooms: [
    { name: "Room 101",    capacity: 30 },
    { name: "Room 102",    capacity: 30 },
    { name: "Science Lab", capacity: 25 },
    { name: "Art Room",    capacity: 20 }
  ],
  columns: [
    { name: "Column A", unavailable: [] },
    { name: "Column B", unavailable: [[3,1]] },
    { name: "Column C", unavailable: [] }
  ],
  subjects: [
    { name: "Mathematics", column: "Column A", teacher: "Ms. Smith",  periods_per_week: 4, room: "Room 101",    preferred_periods: [[1,2],[2,2],[3,2],[4,2]] },
    { name: "Biology",     column: "Column A", teacher: "Mr. Jones",  periods_per_week: 4, room: "Science Lab", preferred_periods: [] },
    { name: "Art",         column: "Column A", teacher: "Mrs. Brown", periods_per_week: 2, room: "Art Room",    preferred_periods: [] },
    { name: "History",     column: "Column B", teacher: "Mr. Davis",  periods_per_week: 3, room: "Room 102",    preferred_periods: [] },
    { name: "Geography",   column: "Column B", teacher: "Mrs. Brown", periods_per_week: 3, room: "Room 101",    preferred_periods: [] },
    { name: "French",      column: "Column C", teacher: "Ms. Smith",  periods_per_week: 3, room: "Room 102",    preferred_periods: [] },
    { name: "German",      column: "Column C", teacher: "Mr. Jones",  periods_per_week: 3, room: "Room 101",    preferred_periods: [] }
  ]
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(v) {
  return String(v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function slotChipsHtml(slots, removeFn) {
  return slots.map((sl, j) =>
    `<span class="chip">D${sl[0]} P${sl[1]}<button class="chip-btn" onclick="_h['${removeFn}'](${j})" title="Remove">×</button></span>`
  ).join("");
}

function slotAddRowHtml(dayId, perId, addFn) {
  return `<span class="slot-add-row">
    Day <input type="number" min="1" id="${dayId}" style="width:44px" placeholder="1" />
    Per <input type="number" min="1" id="${perId}" style="width:44px" placeholder="1" />
    <button class="btn-add-slot" onclick="_h['${addFn}']()" >+</button>
  </span>`;
}

// ── Render: Teachers ──────────────────────────────────────────────────────────
function renderTeachers() {
  const c = document.getElementById("teachers-container");
  c.innerHTML = "";
  s.teachers.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "item-row";
    div.innerHTML = `
      <div class="field-group">
        <label>Name</label>
        <input type="text" value="${esc(t.name)}"
          onchange="s.teachers[${i}].name=this.value; renderSubjects()" />
      </div>
      <div class="field-group" style="flex:1;min-width:0">
        <label>Unavailable Slots</label>
        <div class="slot-chips" id="t${i}-chips">
          ${slotChipsHtml(t.unavailable, `_rmTSlot${i}`)}
          ${slotAddRowHtml(`t${i}-ad`, `t${i}-ap`, `_addTSlot${i}`)}
        </div>
      </div>
      <button class="btn-delete" onclick="s.teachers.splice(${i},1); renderAll()" title="Remove teacher">✕</button>`;
    c.appendChild(div);
    // Attach scoped slot helpers after element is in DOM
    _h[`_addTSlot${i}`] = () => {
      const d = parseInt(document.getElementById(`t${i}-ad`).value);
      const p = parseInt(document.getElementById(`t${i}-ap`).value);
      if (d >= 1 && p >= 1) { s.teachers[i].unavailable.push([d, p]); renderTeachers(); }
    };
    _h[`_rmTSlot${i}`] = (j) => { s.teachers[i].unavailable.splice(j, 1); renderTeachers(); };
  });
}

function addTeacher() {
  s.teachers.push({ name: "", unavailable: [] });
  renderTeachers();
  renderSubjects();
}

// ── Render: Rooms ─────────────────────────────────────────────────────────────
function renderRooms() {
  const c = document.getElementById("rooms-container");
  c.innerHTML = "";
  s.rooms.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "item-row";
    div.innerHTML = `
      <div class="field-group">
        <label>Name</label>
        <input type="text" value="${esc(r.name)}"
          onchange="s.rooms[${i}].name=this.value; renderSubjects()" />
      </div>
      <div class="field-group">
        <label>Capacity</label>
        <input type="number" value="${r.capacity}" min="1" style="width:68px"
          onchange="s.rooms[${i}].capacity=parseInt(this.value)||30" />
      </div>
      <button class="btn-delete" onclick="s.rooms.splice(${i},1); renderAll()" title="Remove room">✕</button>`;
    c.appendChild(div);
  });
}

function addRoom() {
  s.rooms.push({ name: "", capacity: 30 });
  renderRooms();
  renderSubjects();
}

// ── Render: Columns ───────────────────────────────────────────────────────────
function renderColumns() {
  const c = document.getElementById("columns-container");
  c.innerHTML = "";
  s.columns.forEach((col, i) => {
    const div = document.createElement("div");
    div.className = "item-row";
    div.innerHTML = `
      <div class="field-group">
        <label>Name</label>
        <input type="text" value="${esc(col.name)}"
          onchange="s.columns[${i}].name=this.value; renderSubjects()" />
      </div>
      <div class="field-group" style="flex:1;min-width:0">
        <label>Unavailable Slots</label>
        <div class="slot-chips" id="c${i}-chips">
          ${slotChipsHtml(col.unavailable, `_rmCSlot${i}`)}
          ${slotAddRowHtml(`c${i}-ad`, `c${i}-ap`, `_addCSlot${i}`)}
        </div>
      </div>
      <button class="btn-delete" onclick="s.columns.splice(${i},1); renderAll()" title="Remove column">✕</button>`;
    c.appendChild(div);
    _h[`_addCSlot${i}`] = () => {
      const d = parseInt(document.getElementById(`c${i}-ad`).value);
      const p = parseInt(document.getElementById(`c${i}-ap`).value);
      if (d >= 1 && p >= 1) { s.columns[i].unavailable.push([d, p]); renderColumns(); }
    };
    _h[`_rmCSlot${i}`] = (j) => { s.columns[i].unavailable.splice(j, 1); renderColumns(); };
  });
}

function addColumn() {
  s.columns.push({ name: "", unavailable: [] });
  renderColumns();
  renderSubjects();
}

// ── Render: Subjects ──────────────────────────────────────────────────────────
function renderSubjects() {
  const c = document.getElementById("subjects-container");
  c.innerHTML = "";

  const teacherOpts = s.teachers.map(t => `<option value="${esc(t.name)}">${esc(t.name)}</option>`).join("");
  const columnOpts  = s.columns.map(col => `<option value="${esc(col.name)}">${esc(col.name)}</option>`).join("");
  const roomOpts    = `<option value="">— none —</option>` +
    s.rooms.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join("");

  s.subjects.forEach((sub, i) => {
    const div = document.createElement("div");
    div.className = "item-row";
    div.innerHTML = `
      <div class="subject-row-fields">
        <div class="field-group">
          <label>Subject Name</label>
          <input type="text" value="${esc(sub.name)}"
            onchange="s.subjects[${i}].name=this.value" />
        </div>
        <div class="field-group">
          <label>Column</label>
          <select id="sub${i}-col" onchange="s.subjects[${i}].column=this.value">
            <option value="">— select —</option>
            ${columnOpts}
          </select>
        </div>
        <div class="field-group">
          <label>Teacher</label>
          <select id="sub${i}-tch" onchange="s.subjects[${i}].teacher=this.value">
            <option value="">— select —</option>
            ${teacherOpts}
          </select>
        </div>
        <div class="field-group">
          <label>Periods / Week</label>
          <input type="number" value="${sub.periods_per_week}" min="1" style="width:64px"
            onchange="s.subjects[${i}].periods_per_week=parseInt(this.value)||1" />
        </div>
        <div class="field-group">
          <label>Room (optional)</label>
          <select id="sub${i}-rm" onchange="s.subjects[${i}].room=this.value ? this.value : null">
            ${roomOpts}
          </select>
        </div>
        <div class="field-group" style="flex:1;min-width:160px">
          <label>Preferred Periods</label>
          <div class="slot-chips" id="sub${i}-chips">
            ${slotChipsHtml(sub.preferred_periods, `_rmSSlot${i}`)}
            ${slotAddRowHtml(`sub${i}-ad`, `sub${i}-ap`, `_addSSlot${i}`)}
          </div>
        </div>
      </div>
      <button class="btn-delete" onclick="s.subjects.splice(${i},1); renderSubjects()" title="Remove subject">✕</button>`;
    c.appendChild(div);

    // Set dropdown values (must be done after innerHTML assignment)
    document.getElementById(`sub${i}-col`).value = sub.column || "";
    document.getElementById(`sub${i}-tch`).value = sub.teacher || "";
    document.getElementById(`sub${i}-rm`).value  = sub.room || "";

    _h[`_addSSlot${i}`] = () => {
      const d = parseInt(document.getElementById(`sub${i}-ad`).value);
      const p = parseInt(document.getElementById(`sub${i}-ap`).value);
      if (d >= 1 && p >= 1) { s.subjects[i].preferred_periods.push([d, p]); renderSubjects(); }
    };
    _h[`_rmSSlot${i}`] = (j) => { s.subjects[i].preferred_periods.splice(j, 1); renderSubjects(); };
  });
}

function addSubject() {
  s.subjects.push({ name: "", column: "", teacher: "", periods_per_week: 1, room: null, preferred_periods: [] });
  renderSubjects();
}

// ── Render all sections ───────────────────────────────────────────────────────
function renderAll() {
  renderTeachers();
  renderRooms();
  renderColumns();
  renderSubjects();
}

// ── Load example ──────────────────────────────────────────────────────────────
function loadExample() {
  s = JSON.parse(JSON.stringify(EXAMPLE));
  document.getElementById("tt-name").value    = s.name;
  document.getElementById("tt-days").value    = s.days_per_week;
  document.getElementById("tt-periods").value = s.periods_per_day;
  renderAll();
}

// ── Build config object from current state ────────────────────────────────────
function buildConfig() {
  return {
    name:            document.getElementById("tt-name").value.trim() || "Timetable",
    days_per_week:   Math.max(1, parseInt(document.getElementById("tt-days").value)    || 5),
    periods_per_day: Math.max(1, parseInt(document.getElementById("tt-periods").value) || 6),
    teachers: s.teachers.map(t => ({ name: t.name, unavailable: t.unavailable })),
    rooms:    s.rooms.map(r    => ({ name: r.name, capacity: r.capacity })),
    columns:  s.columns.map(c  => ({ name: c.name, unavailable: c.unavailable })),
    subjects: s.subjects.map(sub => {
      const obj = {
        name: sub.name,
        column: sub.column,
        teacher: sub.teacher,
        periods_per_week: sub.periods_per_week,
      };
      if (sub.room) obj.room = sub.room;
      if (sub.preferred_periods && sub.preferred_periods.length) obj.preferred_periods = sub.preferred_periods;
      return obj;
    }),
  };
}

// ── UI wiring ─────────────────────────────────────────────────────────────────
const btnSchedule = document.getElementById("btn-schedule");
const btnReset    = document.getElementById("btn-reset");
const status      = document.getElementById("status");
const placeholder = document.getElementById("placeholder");
const output      = document.getElementById("output");

loadExample();

btnReset.addEventListener("click", () => { loadExample(); clearOutput(); });

function clearOutput() {
  output.classList.add("hidden");
  placeholder.classList.remove("hidden");
  setStatus("", "");
}

function setStatus(msg, type) {
  status.textContent = msg;
  status.className = type || "";
}

// --- Tabs ---
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
  });
});

// --- Schedule ---
btnSchedule.addEventListener("click", async () => {
  const data = buildConfig();

  btnSchedule.disabled = true;
  setStatus("Scheduling…", "");

  try {
    const resp = await fetch("/api/schedule", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const json = await resp.json();

    if (!resp.ok) {
      const msg = json.error || "Unknown error";
      const details = json.details ? "\n• " + json.details.join("\n• ") : "";
      setStatus(msg + details, "error");
      return;
    }

    renderResults(json, data);
    setStatus("Done ✓", "ok");
  } catch (e) {
    setStatus("Network error: " + e.message, "error");
  } finally {
    btnSchedule.disabled = false;
  }
});

// ── Results rendering (unchanged) ─────────────────────────────────────────────
function renderResults(result, cfg) {
  placeholder.classList.add("hidden");
  output.classList.remove("hidden");

  // Reset to timetable tab
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelector('[data-tab="timetable"]').classList.add("active");
  document.getElementById("tab-timetable").classList.add("active");

  // Stats
  const hard = result.conflicts.filter(c => c.severity === "hard").length;
  const soft = result.conflicts.filter(c => c.severity === "soft").length;
  document.getElementById("stats").innerHTML = `
    <div class="stat-box">
      <div class="label">Sessions placed</div>
      <div class="value">${result.sessions.length}</div>
    </div>
    <div class="stat-box">
      <div class="label">Hard conflicts</div>
      <div class="value" style="color:${hard ? '#e53e3e' : '#38a169'}">${hard}</div>
    </div>
    <div class="stat-box">
      <div class="label">Soft warnings</div>
      <div class="value" style="color:${soft ? '#d69e2e' : '#38a169'}">${soft}</div>
    </div>
    <div class="stat-box">
      <div class="label">Timetable</div>
      <div class="value" style="font-size:1rem;padding-top:.25rem">${esc(result.timetable.name)}</div>
    </div>
  `;

  // Timetable grid
  renderGrid(result.sessions, result.timetable.days_per_week, result.timetable.periods_per_day);

  // Sessions table
  const tbody = document.getElementById("sessions-body");
  tbody.innerHTML = "";
  result.sessions.forEach(s => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${DAY_NAMES[s.day - 1] || "Day " + s.day}</td>
      <td>P${s.period}</td>
      <td>${esc(s.column)}</td>
      <td>${esc(s.subject)}</td>
      <td>${esc(s.teacher)}</td>
      <td>${esc(s.room)}</td>
    `;
    tbody.appendChild(tr);
  });

  // Conflicts
  const cl = document.getElementById("conflict-list");
  const nc = document.getElementById("no-conflicts");
  cl.innerHTML = "";
  if (result.conflicts.length === 0) {
    nc.classList.remove("hidden");
  } else {
    nc.classList.add("hidden");
    result.conflicts.forEach(c => {
      const li = document.createElement("li");
      li.className = c.severity;
      let loc = "";
      if (c.day != null) {
        loc = ` [Day ${c.day}`;
        if (c.period != null) { loc += `, P${c.period}`; }
        loc += "]";
      }
      li.innerHTML = `<span class="pill pill-${esc(c.severity)}">${esc(c.severity.toUpperCase())}</span> <strong>${esc(c.category)}</strong>: ${esc(c.description)}${esc(loc)}`;
      cl.appendChild(li);
    });
  }
}

function renderGrid(sessions, daysPerWeek, periodsPerDay) {
  const bySlot = {};
  sessions.forEach(s => {
    const key = `${s.day},${s.period}`;
    (bySlot[key] = bySlot[key] || []).push(s);
  });

  const table = document.createElement("table");

  // Header
  const thead = table.createTHead();
  const hrow = thead.insertRow();
  const thPeriod = document.createElement("th");
  thPeriod.textContent = "";
  hrow.appendChild(thPeriod);
  for (let d = 1; d <= daysPerWeek; d++) {
    const th = document.createElement("th");
    th.textContent = DAY_NAMES[d - 1] || `Day ${d}`;
    hrow.appendChild(th);
  }

  // Body
  const tbody = table.createTBody();
  for (let p = 1; p <= periodsPerDay; p++) {
    const tr = tbody.insertRow();
    const tdLabel = tr.insertCell();
    tdLabel.textContent = `P${p}`;
    tdLabel.style.fontWeight = "600";
    tdLabel.style.background = "#edf2f7";

    for (let d = 1; d <= daysPerWeek; d++) {
      const td = tr.insertCell();
      const key = `${d},${p}`;
      const items = bySlot[key] || [];
      if (items.length === 0) {
        td.style.color = "#a0aec0";
        td.textContent = "—";
      } else {
        td.innerHTML = items.map(s =>
          `<div style="margin-bottom:.2rem">
            <strong>${esc(s.subject)}</strong><br/>
            <span style="color:#718096;font-size:.72rem">${esc(s.teacher)} · ${esc(s.room)}</span>
          </div>`
        ).join("");
      }
    }
  }

  const container = document.getElementById("grid-container");
  container.innerHTML = "";
  container.appendChild(table);
}
</script>
